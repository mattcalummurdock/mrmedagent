# Deploy Sarah agent to Google Cloud Run.
# Repository secrets: GCP_PROJECT_ID, GCP_REGION, GCP_SA_KEY, and all app env vars below.

name: Deploy agent to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVICE: mrmed-agent

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="gcr.io/${PROJECT_ID}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 2Gi \
            --cpu 1 \
            --timeout 3600 \
            --min-instances 1 \
            --set-env-vars "\
          AGENT_PUBLIC_URL=${{ secrets.AGENT_PUBLIC_URL }},\
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
          GEMINI_MODEL=${{ secrets.GEMINI_MODEL }},\
          GEMINI_VOICE_NAME=${{ secrets.GEMINI_VOICE_NAME }},\
          LLM_TEMPERATURE=0.1,\
          CUBE_BASE=${{ secrets.CUBE_BASE }},\
          CUBEJS_API_SECRET=${{ secrets.CUBEJS_API_SECRET }},\
          DATABASE_URL=${{ secrets.DATABASE_URL }},\
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},\
          GROQ_MODEL=${{ secrets.GROQ_MODEL }},\
          EXOTEL_API_KEY=${{ secrets.EXOTEL_API_KEY }},\
          EXOTEL_API_TOKEN=${{ secrets.EXOTEL_API_TOKEN }},\
          EXOTEL_SID=${{ secrets.EXOTEL_SID }},\
          EXOTEL_APP_ID=${{ secrets.EXOTEL_APP_ID }},\
          EXOTEL_PHONE_NUMBER=${{ secrets.EXOTEL_PHONE_NUMBER }},\
          EXOTEL_CONNECT_API_BASE_URL=https://api.exotel.com"
